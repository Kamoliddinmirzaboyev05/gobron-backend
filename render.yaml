services: 
   - type: web 
     name: gobron-backend 
     runtime: node 
     buildCommand: npm install && npx prisma generate && npm run build 
     startCommand: npx prisma migrate deploy && npm run start:prod 
     envVars: 
       - key: NODE_ENV 
         value: production 
       - key: DATABASE_URL 
         sync: false 
       - key: JWT_SECRET 
         sync: false 
       - key: JWT_EXPIRES_IN 
         value: 7d 
       - key: JWT_REFRESH_EXPIRES_IN 
         value: 30d 
       - key: TELEGRAM_BOT_TOKEN 
         sync: false 
       - key: SUPERADMIN_TELEGRAM_ID 
         sync: false 
